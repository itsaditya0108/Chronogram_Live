# ===============================
# SERVER CONFIG (PRODUCTION - VPS)
# ===============================
server.address=0.0.0.0
server.port=8083
spring.application.name=video-service

# ===============================
# MYSQL DATABASE CONFIG (VULTR VPS)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/chronogram_video?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=video_user
spring.datasource.password=aditya@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ===============================
# MULTIPART FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=5GB

# ===============================
# VIDEO STORAGE CONFIG
# ===============================
video.storage.mode=s3
video.storage.temp-path=/home/chronogram/data/video-service/temp
video.storage.final-path=/home/chronogram/data/video-service/final

# ===============================
# FFMPEG / FFPROBE PATHS (LINUX)
# ===============================
video.ffmpeg.path=/usr/bin/ffmpeg
video.ffprobe.path=/usr/bin/ffprobe

# ===============================
# AWS S3 CONFIG
# ===============================
aws.s3.bucket=${AWS_S3_BUCKET}
aws.region=${AWS_REGION}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.s3.base-path=users

# ===============================
